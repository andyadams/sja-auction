<!DOCTYPE html>
<html lang="en" class="h-full antialiased">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} &middot; {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50:  '#f0fdfa',
                100: '#ccfbf1',
                500: '#14b8a6',
                600: '#0d9488',
                700: '#0f766e',
              },
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    </style>
  </head>
  <body class="flex h-full flex-col bg-zinc-50 text-zinc-800">
    <main class="flex-1">
      {{ content }}
    </main>

    <footer class="mt-20 border-t border-zinc-200 bg-white">
      <div class="mx-auto max-w-5xl px-4 py-10 sm:px-8">
        <div class="flex flex-col items-start justify-between gap-4 sm:flex-row sm:items-center">
          <p class="text-sm text-zinc-600">
            &copy; {{ 'now' | date: '%Y' }} St. Joan of Arc Boys &amp; Girls Summer Camp Fundraiser.
          </p>
          <p class="text-sm text-zinc-500">
            All proceeds benefit the St. Joan of Arc Summer Camp.
          </p>
        </div>
      </div>
    </footer>
  </body>
</html>
